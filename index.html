    <!-- Microsoft Clarity (added 2026-04-29) — same project ID as
         kristinasherk.com so the Vercel app feeds into the same Clarity
         project. Lets us follow a user from /ai-headshots on Squarespace
         through to Stripe checkout + Generate flow on the Vercel app as
         one continuous funnel. Filter by link_domain in Clarity to
         isolate Vercel-app-specific sessions. Project ID: le4fbqvztl. -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "le4fbqvztl");
    </script>

    <!-- Google Analytics 4 (added 2026-05-13) — dedicated GA4 property for
         generationheadshots.com (Property: GenerAItion Headshots,
         Measurement ID: G-4ZHCF8TYLX, Account: Kristina Sherk Analytics,
         Time zone: New York Eastern, Currency: USD). Created when Google
         Ads was switched to point ads DIRECTLY at generationheadshots.com
         instead of routing through kristinasherk.com/ai-headshots, so
         GenerAItion Headshots' traffic + conversions now need to be
         tracked as their own property rather than as a sub-domain of
         the main Kristina Sherk Analytics flow. Data starts populating
         within 24-48 hours of first hit. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4ZHCF8TYLX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4ZHCF8TYLX');
    </script>
